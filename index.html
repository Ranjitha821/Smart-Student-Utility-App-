<!DOCTYPE html>
<html>
<head>
<title>Smart Student Utility Web App</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Smart Student Utility Web App</h1>

<div class="container">

<div class="card">
<h2>Student Grade Calculator</h2>

<input type="text" id="name" placeholder="Student Name"><br>

<input type="number" id="m1" placeholder="Subject 1"><br>
<input type="number" id="m2" placeholder="Subject 2"><br>
<input type="number" id="m3" placeholder="Subject 3"><br>
<input type="number" id="m4" placeholder="Subject 4"><br>
<input type="number" id="m5" placeholder="Subject 5"><br>

<button onclick="calculateGrade()">Calculate</button>

<p id="gradeResult"></p>
</div>

<div class="card">
<h2>Palindrome Checker</h2>

<input type="text" id="word" placeholder="Enter word">
<button onclick="checkPalindrome()">Check</button>

<p id="palResult"></p>
</div>

<div class="card">
<h2>Number Analyzer</h2>

<input type="number" id="number" placeholder="Enter number">
<button onclick="analyzeNumber()">Analyze</button>

<p id="numResult"></p>
<p id="loopResult"></p>
</div>

<div class="card">
<h2>Login Validation</h2>

<input type="text" id="username" placeholder="Username"><br>
<input type="password" id="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<p id="loginResult"></p>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
